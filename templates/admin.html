<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админка LED-ценников</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f3f4f6;
            color: #111827;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 25px;
        }

        .create-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        input {
            padding: 10px;
            width: 300px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            padding: 10px 20px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.9;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-link {
            display: inline-block;
            text-decoration: none;
            color: #111827;
            border: 1px solid #111827;
            border-radius: 10px;
            padding: 8px 16px;
            background: white;
            font-size: 14px;
        }

        .btn-link:hover {
            background: #111827;
            color: white;
        }

        .delete-form {
            margin: 0;
        }

        .btn-delete {
            background: #dc2626;
            border: 1px solid #dc2626;
            color: white;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>

<h1>Островки</h1>

<form method="POST" action="{{ url_for('create_island') }}" class="create-form">
    <input name="island_name" placeholder="Название островка" required>
    <button type="submit">Создать</button>
</form>

<hr>

{% for island in islands %}
<div class="card">
    <h2>{{ island.name }}</h2>

    <div class="actions">
        <a class="btn-link" href="{{ url_for('island_detail', island_id=island.id) }}">Открыть</a>

        <form 
            method="POST" 
            action="{{ url_for('delete_island', island_id=island.id) }}" 
            class="delete-form"
            onsubmit="return confirm('Точно удалить островок «{{ island.name }}»? Все стороны, полки и товары тоже удалятся.');"
        >
            <button type="submit" class="btn-delete">Удалить</button>
        </form>
    </div>
</div>
{% endfor %}

</body>
</html>
