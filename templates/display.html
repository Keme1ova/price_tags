<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #222;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: {{ side.font_family }}, Arial, sans-serif;
        }

        .led-screen {
            background: {{ side.background_color }};
            color: {{ side.product_color }};
            overflow: hidden;
            box-sizing: border-box;
        }

        .small {
            width: 256px;
            height: 32px;
        }

        .large {
            width: 384px;
            height: 32px;
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            box-sizing: border-box;
        }

        .shelf {
            height: 8px;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 0 3px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .shelf:last-child {
            border-bottom: none;
        }

        .inner {
            width: 100%;
            display: grid;
            align-items: center;
            gap: 2px;
        }

        .product {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
            white-space: nowrap;
            overflow: hidden;
            line-height: 1;
        }

        .name {
            min-width: 0;
            max-width: 62%;
            color: {{ side.product_color }};
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 5px;
            line-height: 1;
        }

        .price {
            flex-shrink: 0;
            color: {{ side.price_color }};
            font-weight: 900;
            font-size: 6px;
            line-height: 1;
        }

        .single-shelf-preview {
            transform: scale(4);
            image-rendering: pixelated;
        }
    </style>
</head>

<body>

<div class="led-screen {{ side.size }}">
    <div class="container">

        {% for shelf in shelves %}
            {% set count = shelf.products|length %}

            <div class="shelf">
                <div
                    class="inner"
                    style="{% if count > 0 %}grid-template-columns: repeat({{ count }}, minmax(0, 1fr));{% endif %}"
                >
                    {% for product in shelf.products %}
                    <div class="product">
                        <div class="name">{{ product.name }}</div>
                        <div class="price">{{ product.price }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>

        {% endfor %}

    </div>
</div>

<script>
let lastUpdate = "{{ side.updated_at.isoformat() }}";
const sideId = {{ side.id }};

setInterval(async () => {
    try {
        const res = await fetch(`/api/side/${sideId}/updated`);
        const data = await res.json();

        if (data.updated_at !== lastUpdate) {
            location.reload();
        }
    } catch (e) {
        console.log("Ошибка обновления");
    }
}, 3000);
</script>

</body>
</html>
