<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #222;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: {{ side.font_family or 'Arial' }}, Arial, sans-serif;
        }

        .led-screen {
            width: {{ side.width_px or 256 }}px;
            height: {{ side.height_px or 32 }}px;
            background: {{ side.background_color or '#000000' }};
            color: {{ side.product_color or '#ffffff' }};
            overflow: hidden;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: repeat({{ shelves|length if shelves|length > 0 else side.shelf_count or 4 }}, minmax(0, 1fr));
            box-sizing: border-box;
        }

        .shelf {
            min-height: 0;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 0 3px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .shelf:last-child {
            border-bottom: none;
        }

        .inner {
            width: 100%;
            height: 100%;
            display: grid;
            align-items: center;
            gap: 2px;
        }

        .product {
            min-width: 0;
            height: 100%;
            display: flex;
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
            box-sizing: border-box;
            text-align: {{ side.text_align or 'center' }};
        }

        {% if side.text_align == 'left' %}
        .product {
            align-items: flex-start;
        }

        .price-right {
            justify-content: flex-start;
        }
        {% elif side.text_align == 'right' %}
        .product {
            align-items: flex-end;
        }

        .price-right {
            justify-content: flex-end;
        }
        {% else %}
        .product {
            align-items: center;
        }

        .price-right {
            justify-content: center;
        }
        {% endif %}

        .price-right {
            flex-direction: row;
            align-items: center;
            gap: 2px;
        }

        .price-bottom,
        .price-top {
            flex-direction: column;
            justify-content: center;
            gap: 1px;
        }

        .price-top .price {
            order: 1;
        }

        .price-top .name {
            order: 2;
        }

        .price-bottom .name {
            order: 1;
        }

        .price-bottom .price {
            order: 2;
        }

        .name {
            min-width: 0;
            color: {{ side.product_color or '#ffffff' }};
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: {{ side.product_font_size or 8 }}px;
            line-height: 1;
            text-align: inherit;
        }

        .price-right .name {
            max-width: 65%;
        }

        .price-bottom .name,
        .price-top .name {
            width: 100%;
        }

        .price {
            flex-shrink: 0;
            color: {{ side.price_color or '#ffde00' }};
            font-weight: 900;
            font-size: {{ side.price_font_size or 12 }}px;
            line-height: 1;
            text-align: inherit;
        }

        .price-bottom .price,
        .price-top .price {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="led-screen">
    <div class="container">

        {% for shelf in shelves %}
            {% set count = shelf.products|length %}

            <div class="shelf">
                <div
                    class="inner"
                    style="{% if count > 0 %}grid-template-columns: repeat({{ count }}, minmax(0, 1fr));{% endif %}"
                >
                    {% for product in shelf.products %}
                    <div class="product price-{{ side.price_position or 'right' }}">
                        <div class="name">{{ product.name }}</div>
                        <div class="price">{{ product.price }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>

        {% endfor %}

    </div>
</div>

<script>
let lastUpdate = "{{ side.updated_at.isoformat() if side.updated_at else '' }}";
const sideId = {{ side.id }};

setInterval(async () => {
    try {
        const res = await fetch(`/api/side/${sideId}/updated`);
        const data = await res.json();

        if (data.updated_at !== lastUpdate) {
            location.reload();
        }
    } catch (e) {
        console.log("Ошибка обновления");
    }
}, 3000);
</script>

</body>
</html>
